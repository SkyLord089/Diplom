  if(!S.se.includes(n)){S.se.push(n);S.dp.study++;addS(1);chkCh()}
  let d=document.getElementById('elD');d.classList.remove('hid');
  d.innerHTML=`<div class="ed apo"><div class="edh"><div class="edi ${e[4]}">${e[5]}</div><div><h3 class="fs25 fw9 c8">${e[1]}</h3><div class="fx ac g2"><p class="fs17 c4 fw9">${e[0]}</p><span style="background:var(--s1);padding:.25rem .75rem;border-radius:.5rem;font-size:.75rem;font-weight:700;color:var(--s6)">№${e[2]}</span></div></div></div>
  <div class="ep"><div class="epi"><div class="epl">Масса</div><div class="epv">${e[3]}</div></div><div class="epi"><div class="epl">Открыт</div><div class="epv">${e[12]}</div></div><div class="epi"><div class="epl">Группа/Период</div><div class="epv">${e[8]}/${e[9]}</div></div><div class="epi"><div class="epl">Состояние</div><div class="epv">${e[11]}</div></div></div>
  <div class="ep mt4" style="grid-template-columns:repeat(3,1fr)"><div class="epi tc" style="background:rgba(251,191,36,.1)"><div class="epl" style="color:#d97706">Валентность</div><div class="epv" style="font-size:2rem;color:#b45309">${e[10]}</div></div><div class="epi tc" style="background:rgba(59,130,246,.1)"><div class="epl" style="color:#2563eb">Электроны</div><div class="epv" style="color:#1d4ed8">${e[7]}</div></div><div class="epi tc" style="background:rgba(244,63,94,.1)"><div class="epl" style="color:#e11d48">Период</div><div class="epv" style="color:#be123c">${e[9]}</div></div></div>
  <div class="ef"><div class="fx ac" style="gap:1.25rem"><div class="fs25" style="opacity:.8">💡</div><div><div style="font-size:.65rem;font-weight:700;color:var(--i5);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem">Знаешь ли ты?</div><p class="fs12 fw5 c7">${e[6]}</p></div></div></div></div>`;
}

// === LAB ===
function rLab(){
  document.getElementById('lab').innerHTML=`
  <div class="cd fx ac jb fw g3"><div><h2 class="fs2 fw9 gt mb2">⚗️ Лаборатория</h2><p class="c6 fw5">Комбинируй элементы слева.</p></div>
  <div class="fx g2 fw"><div class="cd tc" style="padding:1rem;background:rgba(255,255,255,.8)"><div class="c4 fs75 fw7 up tk mb2">Счёт</div><div class="fs17 fw9 ci" id="lsS">${S.gs}</div></div><div class="cd tc" style="padding:1rem;background:rgba(255,255,255,.8)"><div class="c4 fs75 fw7 up tk mb2">Открыто</div><div class="fs17 fw9 ce"><span id="lsC">${S.cc.length}</span><span class="c4 fs87">/12</span></div></div><div class="cd tc" style="padding:1rem;background:rgba(255,255,255,.8)"><div class="c4 fs75 fw7 up tk mb2">Комбо</div><div class="fs17 fw9" style="color:#f97316" id="lsK">${S.st} 🔥</div></div></div></div>
  <div class="lg"><div class="lp"><div class="lh"><h3 class="fw9 c8 fs12">📦 Шкаф элементов</h3><span class="fs75 fw9 ci up tk" style="background:rgba(99,102,241,.1);padding:.375rem .75rem;border-radius:.75rem">Выбери 2</span></div>
  <div class="eg hs2" id="meG" style="max-height:600px;overflow-y:auto;padding-bottom:1rem"></div></div>
  <div class="lp rx"><h3 style="position:absolute;top:1.5rem;width:100%;text-align:center;font-size:1.5rem;font-weight:900;color:var(--i6)">⚗️ Реактор</h3>
  <div id="mxP" class="tc" style="position:absolute;top:4rem;width:100%;z-index:10"></div>
  <div class="ra" id="rxA"><div class="rp">Добавь элементы из шкафа,<br>чтобы начать синтез</div></div>
  <div id="pBar" class="pbt hid"><div class="pbk"><div class="pbf" id="pFill" style="width:0"></div></div><div class="tc fs75 fw9 up tk ci mt4" style="animation:float 1s infinite">Синтез... <span id="pPct">0</span>%</div></div>
  <div id="resC" class="hid"></div>
  <div class="rbt"><button class="rb rbc" onclick="clrR()">Очистить</button><button class="rb rbm" id="mxB" onclick="tryMix()" disabled>Смешать</button></div></div></div>
  <div id="colS" class="cd${S.cc.length?'':' hid'}"><h3 class="fs17 fw9 tc c8 mb6">🏆 Журнал открытий</h3><div class="cg" id="colG"></div></div>`;
  rMeG();rColG();
}

function rMeG(){
  let g=document.getElementById('meG');if(!g)return;
  g.innerHTML=ME.map(e=>`<button class="me ${e[2]}${selEl.find(s=>s[0]===e[0])?' sel':''}${mixing?' dis':''}" onclick="hElC('${e[0]}')"${mixing?' disabled':''}><div class="mei">${e[3]}</div><div class="mes">${e[0]}</div><div class="men">${e[1]}</div><div class="mev">Вал: <span class="ci">${e[4]}</span></div></button>`).join('');
}

function hElC(sym){
  if(mixing)return;let el=ME.find(e=>e[0]===sym);if(!el)return;
  if(selEl.length>=2)selEl=[el];else selEl.push(el);
  rMeG();rRxA();document.getElementById('mxB').disabled=selEl.length!==2;
  let r=document.getElementById('resC');r.classList.add('hid');
}

function rRxA(){
  let a=document.getElementById('rxA');
  if(!selEl.length){a.innerHTML='<div class="rp">Добавь элементы из шкафа,<br>чтобы начать синтез</div>';return}
  let h='';selEl.forEach((e,i)=>{h+=`<div class="re ${e[2]}">${e[3]}</div>`;if(i===0&&selEl.length===2)h+=`<span class="rpl${mixing?' '+' style="animation:spin 1s linear infinite"':''}">+</span>`});
  if(mixing)h+='<span class="rpl">→</span><div class="rmx">⚡</div>';
  a.innerHTML=h;
}

function clrR(){selEl=[];rMeG();rRxA();document.getElementById('mxB').disabled=true;document.getElementById('resC').classList.add('hid');document.getElementById('mxP').innerHTML=''}

function tryMix(){
  if(selEl.length!==2||mixing)return;mixing=true;rMeG();rRxA();
  document.getElementById('mxP').innerHTML='<span style="background:rgba(255,255,255,.9);padding:.5rem 1.25rem;border-radius:.75rem;font-weight:700;font-size:.875rem;color:var(--i6)">Готовим колбы... ⚗️</span>';
  let pb=document.getElementById('pBar'),pf=document.getElementById('pFill'),pp=document.getElementById('pPct');pb.classList.remove('hid');
  let p=0,iv=setInterval(()=>{p+=5;pf.style.width=p+'%';pp.textContent=p;if(p>=100)clearInterval(iv)},50);
  setTimeout(()=>{
    clearInterval(iv);pf.style.width='100%';pp.textContent='100';
    let s=selEl.map(e=>e[0]).sort(),f=VC.find(c=>{let cs=[c[0],c[1]].sort();return cs[0]===s[0]&&cs[1]===s[1]});
    if(f){let nw=!S.cc.find(c=>c[2]===f[2]);if(nw){S.cc.push(f);S.gs+=f[5];S.st++;S.dp.mix++;addS(f[5]);setMsg(APHR[1][Math.floor(Math.random()*3)]);if(!S.lb.includes(f[8])){S.lb.push(f[8])}}else S.st=0;showRes(f,true)}
    else{S.st=0;showRes(null,false);setMsg(APHR[2][Math.floor(Math.random()*3)])}
    selEl=[];mixing=false;setTimeout(()=>{pb.classList.add('hid');pf.style.width='0'},500);
    rMeG();rRxA();rColG();updLabS();chkCh();save();
  },1200);
}

function showRes(c,ok){
  let r=document.getElementById('resC');r.classList.remove('hid');document.getElementById('mxP').innerHTML='';
  if(ok&&c){r.className='rc ok apo';r.innerHTML=`<div class="fs4 mb4 afl">✨</div><div class="rcf gt">${c[2]}</div><div class="fs17 fw9 c8 up tk mb2">${c[3]}</div><div class="c6 fw5 fs87 mb6">${c[4]}</div><div class="ri"><span class="ril">Тип связи</span><span class="riv">${c[8]}</span></div><div class="ri"><span class="ril">Уравнение</span><span class="riv" style="font-family:monospace">${c[9]}</span></div><div style="display:inline-block;background:#d1fae5;color:#059669;border-radius:9999px;padding:.5rem 1.5rem;font-weight:900;font-size:.875rem;text-transform:uppercase;letter-spacing:.1em;border:1px solid #a7f3d0;margin-bottom:1rem">+${c[5]} XP</div>${c[10]?`<div style="background:rgba(59,130,246,.05);border-radius:.75rem;padding:1rem;text-align:left;border:1px solid rgba(59,130,246,.1)"><span style="font-size:.6rem;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:.25rem">Знаешь ли ты?</span><span class="fs75 fw7 c7">💡 ${c[10]}</span></div>`:''}`}
  else{r.className='rc no apo';r.innerHTML=`<div class="fs4 mb4">💥</div><div class="fs17 fw9 mb2" style="color:var(--ro)">Несовместимо!</div><div class="c6 fs87 fw5 mb6">Эти элементы не образуют соединение.</div><div style="background:var(--s1,#f8fafc);border-radius:.75rem;padding:1rem;border:1px solid var(--s2);text-align:left"><div class="ril mb2">Подсказки:</div><div class="c7 fw7" style="font-family:monospace;letter-spacing:.1em">H+O, Na+Cl, C+O, H+Cl...</div></div>`}
}

function rColG(){
  let g=document.getElementById('colG'),s=document.getElementById('colS');if(!g||!s)return;
  if(!S.cc.length){s.classList.add('hid');return}s.classList.remove('hid');
  g.innerHTML=S.cc.map(c=>`<div class="ci2 ${c[7]}"><div style="font-size:2rem;margin-bottom:.5rem">${c[6]}</div><div class="fw9 fs15 tk">${c[2]}</div><div style="font-size:.6rem;font-weight:700;text-transform:uppercase;margin-top:.25rem;opacity:.9">${c[3]}</div></div>`).join('');
}

function updLabS(){
  let a=document.getElementById('lsS'),b=document.getElementById('lsC'),c=document.getElementById('lsK');
  if(a)a.textContent=S.gs;if(b)b.textContent=S.cc.length;if(c)c.textContent=S.st+' 🔥';
}

// === MEMORY ===
function initMem(){
  let d=MC.flatMap(c=>[{s:c[0],e:c[1],c:c[2],u:Math.random()},{s:c[0],e:c[1],c:c[2],u:Math.random()}]);
  mDeck=d.sort(()=>Math.random()-.5);mFlip=[];mMatch=[];mMov=0;
}

function rMem(){
  document.getElementById('memory').innerHTML=`
  <div class="cd tc"><h2 class="fs25 fw9 mb4" style="background:linear-gradient(to right,#10b981,#14b8a6);-webkit-background-clip:text;background-clip:text;color:transparent">🎴 Химическая Память</h2><p class="c6 fs12 fw5">Тренируй мозг, запоминая элементы!</p></div>
  <div class="fx jc g3 fw mb8"><div class="cd tc" style="padding:1rem;background:rgba(255,255,255,.8)"><div class="c4 fs75 fw7 up tk mb2">Счёт</div><div class="fs2 fw9 ci">${S.ms}</div></div><div class="cd tc" style="padding:1rem;background:rgba(255,255,255,.8)"><div class="c4 fs75 fw7 up tk mb2">Ходы</div><div class="fs2 fw9" style="color:var(--p6)">${mMov}</div></div></div>
  <div class="cd" style="max-width:600px;margin:0 auto"><div class="mmg" id="mmG"></div></div>
  <div class="tc mt6"><button class="btn bs" onclick="initMem();rMem()">🔄 Раздать заново</button></div>
  <div id="mWin" class="hid"></div>`;
  rMemG();
}

function rMemG(){
  let g=document.getElementById('mmG');if(!g)return;
  g.innerHTML=mDeck.map(c=>{let fl=mFlip.includes(c.u)||mMatch.includes(c.u),mt=mMatch.includes(c.u);
  return`<button class="mc${fl?' fl '+c.c:' hd'}${mt?' mt2':''}" onclick="flipC(${c.u})"${fl?' disabled':''}>${fl?`<div style="font-size:1.5rem">${c.e}</div><div style="font-size:1.25rem;margin-top:.25rem">${c.s}</div>`:'<div style="font-size:1.5rem;opacity:.5">❓</div>'}</button>`}).join('');
}

function flipC(u){
  if(mFlip.length>=2||mFlip.includes(u)||mMatch.includes(u))return;
  mFlip.push(u);rMemG();
  if(mFlip.length===2){mMov++;
    let c1=mDeck.find(c=>c.u===mFlip[0]),c2=mDeck.find(c=>c.u===mFlip[1]);
    if(c1&&c2&&c1.s===c2.s){setTimeout(()=>{mMatch.push(mFlip[0],mFlip[1]);mFlip=[];S.ms+=5;S.dp.memory++;addS(5);rMem();chkCh();if(mMatch.length===mDeck.length){let w=document.getElementById('mWin');w.classList.remove('hid');w.innerHTML=`<div class="mo"><div class="md apo"><div class="fs4 mb4 afl">🎊</div><div class="fs2 fw9 mb2" style="color:var(--em)">Победа!</div><div class="c6 fw5 mb6">Все пары за <b class="ci fs15">${mMov}</b> ходов.</div><button class="btn bp" style="width:100%" onclick="initMem();rMem()">Играть снова</button></div></div>`}},500)}
    else setTimeout(()=>{mFlip=[];rMemG()},1000);
  }
}

// === QUIZ ===
function rQuiz(){
  document.getElementById('quiz').innerHTML=`
  <div class="cd tc"><h2 class="fs25 fw9 mb4" style="background:linear-gradient(to right,#f43f5e,#6366f1);-webkit-background-clip:text;background-clip:text;color:transparent">✅ Экзамен</h2><p class="c6 fs12 fw5">Проверь знания!</p></div>
  <div style="max-width:600px;margin:0 auto">
  <div id="qSt" class="cd tc"><div class="fs5 mb6 afl">⏱️</div><h3 class="fs17 fw9 mb4 c8">Готов к тесту?</h3><p class="c6 mb8" style="max-width:400px;margin:0 auto 2rem;line-height:1.6">10 вопросов на время. За верный ответ — опыт.</p><button class="btn bp" onclick="startQ()">Начать</button></div>
  <div id="qGm" class="cd hid"></div>
  <div id="qRs" class="cd tc hid"></div></div>`;
}

function startQ(){qI=0;qC=0;qA=null;qT=0;
  document.getElementById('qSt').classList.add('hid');document.getElementById('qRs').classList.add('hid');
  document.getElementById('qGm').classList.remove('hid');
  qTmr=setInterval(()=>{qT+=.1;let t=document.getElementById('qTm');if(t)t.textContent=qT.toFixed(1)+'с'},100);
  rQQ();
}

function rQQ(){
  let q=QZ[qI];
  document.getElementById('qGm').innerHTML=`
  <div class="fx jb ac mb6"><span class="fs75 fw7 up tk c5" style="background:#fff;padding:.5rem 1rem;border-radius:.75rem">Вопрос ${qI+1}/10</span><span class="ci fw9">${qC} правильных</span></div>
  <div class="fx ac jb mb8" style="background:rgba(255,255,255,.6);padding:1rem;border-radius:1rem;border:1px solid #fff"><span class="fs75 fw7 c4 up tk">Время:</span><span class="fs17 fw9 cr" style="font-family:monospace" id="qTm">${qT.toFixed(1)}с</span></div>
  <div class="qp"><div class="qpf" style="width:${(qI+1)/10*100}%"></div></div>
  <h3 class="fs15 fw9 mb6 c8">${q[0]}</h3>
  ${q[1].map((o,i)=>`<button class="qo${qA===i?' qs':''}" onclick="qA=${i};rQQ()">${i+1}. ${o}</button>`).join('')}
  <button class="btn bp" style="width:100%;margin-top:2rem" onclick="nextQ()"${qA===null?' disabled':''}>
  ${qI<9?'Далее':'Завершить'}</button>`;
}

function nextQ(){
  if(qA===QZ[qI][2])qC++,S.dp.quiz++;
  if(qI<9){qI++;qA=null;rQQ()}else finQ();
}

function finQ(){
  clearInterval(qTmr);
  document.getElementById('qGm').classList.add('hid');let r=document.getElementById('qRs');r.classList.remove('hid');
  let em=qC>=8?'🏆':qC>=5?'👏':'📚',msg=qC>=8?'Блестяще! Ты эксперт.':qC>=5?'Неплохо! Есть куда расти.':'Почитай учебник!';
  r.innerHTML=`<div class="fs5 mb4 afl">${em}</div><h3 class="fs2 fw9 mb6 c8">Тест завершён!</h3><div class="fx jc g4 mb8"><div class="cd" style="padding:1.25rem;background:#fff;min-width:120px"><div class="fs75 fw7 c4 up tk mb2">Результат</div><div class="fs25 fw9 ci">${qC}<span class="fs12 c4">/10</span></div></div><div class="cd" style="padding:1.25rem;background:#fff;min-width:120px"><div class="fs75 fw7 c4 up tk mb2">Время</div><div class="fs25 fw9 cr">${qT.toFixed(1)}с</div></div></div><p class="fs12 mb8 fw5 c6">${msg}</p><button class="btn bs" onclick="rQuiz()">Пройти заново</button>`;
  addS(qC*3);
  if(qC>=8&&!S.ua.includes('quiz_master')){S.ua.push('quiz_master');showAP(ACH[7]);addS(15)}
  chkCh();save();
}

// === CHALLENGES ===
function rChal(){
  document.getElementById('challenges').innerHTML=`
  <div class="cd tc"><h2 class="fs25 fw9 mb4" style="background:linear-gradient(to right,#8b5cf6,#d946ef);-webkit-background-clip:text;background-clip:text;color:transparent">📅 Квесты</h2><p class="c6 fs12 fw5">Выполняй задания!</p></div>
  <div class="cd mb6"><div class="fx ac g4 fw"><div style="font-size:3rem;background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(217,70,239,.1));padding:1rem;border-radius:1rem">🔥</div><div><div class="fs17 fw9" style="color:#5b21b6">Серия: ${S.ls} дней подряд</div><div class="fs87 fw5" style="color:#7c3aed">Заходи каждый день!</div></div></div></div>
  <div class="gr mg2" style="gap:1.25rem">${DC.map(ch=>{let cur=S.dp[ch[2]]||0,comp=S.cch.includes(ch[0]),pr=Math.min(cur/ch[3]*100,100);
  return`<div class="chc${comp?' cp':''}"><div class="fx ac g3 mb6"><div style="font-size:2.5rem;padding:.75rem;border-radius:1rem;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid #fff;background:${comp?'#d1fae5':'var(--s1)'}">${ch[5]}</div><div class="f1"><h3 class="fs12 fw9 c8">${ch[1]}</h3><div style="font-size:.6rem;font-weight:700;color:#7c3aed;text-transform:uppercase;letter-spacing:.1em;margin-top:.25rem">+${ch[4]} XP</div></div>${comp?'<div style="font-size:1.5rem">✅</div>':''}</div><div class="chp"><div class="chpf${comp?' cp':''}" style="width:${pr}%"></div></div><div class="fx jb mt4" style="font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em"><span class="c4">${cur}/${ch[3]}</span><span style="color:${comp?'var(--em)':'#8b5cf6'}">${comp?'Готово':Math.round(pr)+'%'}</span></div></div>`}).join('')}</div>`;
}

function chkCh(){
  DC.forEach(ch=>{if(S.cch.includes(ch[0]))return;let cur=S.dp[ch[2]]||0;if(cur>=ch[3]){S.cch.push(ch[0]);addS(ch[4]);setMsg('Задание выполнено! +'+ch[4]+' XP! 🎁')}});
  save();
}

init();
</script>
</body>
</html>
